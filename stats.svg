<svg width="900" height="90" viewBox="0 0 900 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#02030A"/>
      <stop offset="100%" style="stop-color:#0A0C1A"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="90" fill="url(#bg)" rx="6"/>

  <!-- Dividers -->
  <line x1="225" y1="15" x2="225" y2="75" stroke="rgba(198,255,0,0.1)" stroke-width="1"/>
  <line x1="450" y1="15" x2="450" y2="75" stroke="rgba(198,255,0,0.1)" stroke-width="1"/>
  <line x1="675" y1="15" x2="675" y2="75" stroke="rgba(198,255,0,0.1)" stroke-width="1"/>

  <!-- Stat 1 -->
  <text x="112" y="48" text-anchor="middle" font-family="'Arial Black', monospace" font-size="32" font-weight="900" fill="#C6FF00" filter="url(#glow)">7</text>
  <text x="112" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(198,255,0,0.55)" letter-spacing="2">MICROSERVICES</text>

  <!-- Stat 2 -->
  <text x="337" y="48" text-anchor="middle" font-family="'Arial Black', monospace" font-size="32" font-weight="900" fill="#00CFFF" filter="url(#glow)">&lt;5m</text>
  <text x="337" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(0,207,255,0.55)" letter-spacing="2">CSV TO INSIGHT</text>

  <!-- Stat 3 -->
  <text x="562" y="48" text-anchor="middle" font-family="'Arial Black', monospace" font-size="32" font-weight="900" fill="#FF2020" filter="url(#glow)">4</text>
  <text x="562" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,32,32,0.55)" letter-spacing="2">AI AGENTS</text>

  <!-- Stat 4 -->
  <text x="787" y="48" text-anchor="middle" font-family="'Arial Black', monospace" font-size="32" font-weight="900" fill="#D4A017" filter="url(#glow)">61+</text>
  <text x="787" y="68" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(212,160,23,0.55)" letter-spacing="2">MLFLOW RUNS</text>

  <!-- Animated scan line -->
  <rect x="0" y="0" width="900" height="1" fill="rgba(198,255,0,0.4)">
    <animate attributeName="y" values="-1;91" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
